# ???????????????????????????????????????????????????????????????
# SERVER
# ???????????????????????????????????????????????????????????????
server.port=8080

# ???????????????????????????????????????????????????????????????
# DATABASE ? MySQL
# ???????????????????????????????????????????????????????????????
# Create a schema named 'argue_with_stranger' in MySQL before running.
# Command: CREATE DATABASE argue_with_stranger;
spring.datasource.url=jdbc:mysql://localhost:3306/argue_with_stranger?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=123456789
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ???????????????????????????????????????????????????????????????
# JPA / HIBERNATE
# ???????????????????????????????????????????????????????????????
# update   ? Hibernate creates/alters tables automatically from entities.
#            Safe for development. Change to 'validate' in production.
spring.jpa.hibernate.ddl-auto=update

spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Naming strategy ? converts camelCase fields to snake_case columns automatically
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl

# ???????????????????????????????????????????????????????????????
# JWT
# ???????????????????????????????????????????????????????????????
# Secret must be at least 256 bits (32 characters) for HS256.
# In production replace this with an environment variable: ${JWT_SECRET}
app.jwt.secret=ArgueWithStrangerSuperSecretKeyForJWTSigning2024XYZ!
app.jwt.expiration-ms=86400000

# 86400000 ms = 24 hours

# ???????????????????????????????????????????????????????????????
# MULTIPART (file upload limit ? safe default)
# ???????????????????????????????????????????????????????????????
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB

# ???????????????????????????????????????????????????????????????
# LOGGING
# ???????????????????????????????????????????????????????????????
logging.level.root=INFO
logging.level.com.arguewithstranger=DEBUG
logging.level.org.springframework.security=DEBUG
logging.level.org.springframework.web.socket=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

# ???????????????????????????????????????????????????????????????
# JACKSON ? JSON serialization
# ???????????????????????????????????????????????????????????????
# Do not serialize fields that are null ? keeps API responses clean
spring.jackson.default-property-inclusion=non_null

# Write dates as ISO-8601 strings, not timestamps
#spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.time-zone=UTC

# ???????????????????????????????????????????????????????????????
# SPRING SECURITY ? disable default login page noise in logs
# ???????????????????????????????????????????????????????????????
spring.security.user.name=admin
spring.security.user.password=admin