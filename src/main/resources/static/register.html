<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Register — Argue With Stranger</title>
    <link rel="stylesheet" href="css/style.css"/>
</head>
<body class="auth-page">

<div class="auth-card">
    <div class="auth-header">
        <h1 class="brand">⚔️ Argue With Stranger</h1>
        <p class="brand-sub">Create your account</p>
    </div>

    <div id="error-banner" class="error-banner hidden"></div>

    <form id="register-form" novalidate>
        <div class="form-group">
            <label for="username">Username</label>
            <input
                    type="text"
                    id="username"
                    placeholder="Choose a username (letters, numbers, _)"
                    autocomplete="username"
                    required/>
            <span class="field-error" id="username-error"></span>
        </div>

        <div class="form-group">
            <label for="email">Email</label>
            <input
                    type="email"
                    id="email"
                    placeholder="Enter your email"
                    autocomplete="email"
                    required/>
            <span class="field-error" id="email-error"></span>
        </div>

        <div class="form-group">
            <label for="password">Password</label>
            <input
                    type="password"
                    id="password"
                    placeholder="At least 6 characters"
                    autocomplete="new-password"
                    required/>
            <span class="field-error" id="password-error"></span>
        </div>

        <button type="submit" class="btn btn-primary btn-full" id="register-btn">
            Create Account
        </button>
    </form>

    <p class="auth-switch">
        Already have an account?
        <a href="login.html">Login here</a>
    </p>
</div>

<script src="js/api.js"></script>
<script src="js/auth.js"></script>
</body>
</html>
